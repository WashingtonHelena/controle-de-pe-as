<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Controle de Retirada de Peças</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>

body{
font-family:Arial;
background:#eef2f6;
margin:0;
padding:15px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.top{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.logo{
height:50px;
}

h1{
margin:0;
color:#2c3e50;
font-size:22px;
}

.inputs{
display:flex;
gap:10px;
margin-bottom:15px;
flex-wrap:wrap;
}

input,select{
padding:10px;
font-size:16px;
border-radius:5px;
border:1px solid #ccc;
}

#codigo{
flex:1;
font-size:18px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2c7be5;
color:white;
padding:10px;
}

td{
border:2px solid #444;
padding:8px;
text-align:center;
}

.qtdInput{
width:60px;
text-align:center;
}

.remover{
background:#e74c3c;
color:white;
border:none;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
}

.btn{
margin-top:15px;
padding:12px 20px;
background:#27ae60;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
width:100%;
}

</style>
</head>

<body>

<div class="container">

<div class="top">

<img src="logo_siloking.png" class="logo">

<h1>Controle de Retirada de Peças</h1>

</div>

<div class="inputs">

<select id="mecanico">

<option>ANTONIO</option>
<option>RENATO</option>
<option>MAURICIO</option>
<option>ALAN</option>
<option>DANIEL</option>
<option>DANILO</option>
<option>LUCAS</option>
<option>WILLIAM</option>
<option>JOSE ROBERTO</option>
<option>AGNALDO</option>

</select>

<input id="codigo" placeholder="Bipar código da peça">

</div>

<table>

<thead>
<tr>
<th>Código</th>
<th>Produto</th>
<th>Quantidade</th>
<th></th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

<button class="btn" onclick="gerarPDF()">GERAR RELATÓRIO PDF</button>

</div>

<script>

let produtos=[]
let retirada=[]

fetch("produtos_base_completa.json")
.then(r=>r.json())
.then(data=>produtos=data)

document.getElementById("codigo").addEventListener("keypress",function(e){

if(e.key==="Enter"){

let codigo=this.value.trim()

let produto=produtos.find(p=>p.codigo==codigo)

if(!produto){
alert("Produto não encontrado")
return
}

retirada.push({
codigo:produto.codigo,
nome:produto.nome,
quantidade:1
})

render()

this.value=""

}

})

function render(){

let tabela=document.getElementById("lista")
tabela.innerHTML=""

retirada.forEach((item,index)=>{

tabela.innerHTML+=`

<tr>

<td>${item.codigo}</td>

<td>${item.nome}</td>

<td>
<input class="qtdInput" type="number" value="${item.quantidade}"
onchange="alterarQtd(${index},this.value)">
</td>

<td>
<button class="remover" onclick="remover(${index})">X</button>
</td>

</tr>

`

})

}

function alterarQtd(i,v){

retirada[i].quantidade=v

}

function remover(i){

retirada.splice(i,1)
render()

}

function gerarPDF(){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

let mecanico=document.getElementById("mecanico").value
let data=new Date().toLocaleDateString()

doc.setFillColor(44,123,229)
doc.rect(0,0,210,30,"F")

doc.setTextColor(255,255,255)
doc.setFont("helvetica","bold")
doc.setFontSize(20)

doc.text("SILOKING DO BRASIL",105,18,{align:"center"})

doc.setFontSize(12)
doc.text("Controle de Retirada de Peças",105,25,{align:"center"})

doc.setTextColor(0,0,0)

doc.setFont("helvetica","normal")

doc.text("Mecânico: "+mecanico,14,40)
doc.text("Data retirada: "+data,14,47)

let dados=retirada.map(i=>[
i.codigo,
i.nome,
i.quantidade
])

doc.autoTable({

startY:55,

head:[["Código","Produto","Quantidade"]],

body:dados,

theme:"grid",

styles:{lineWidth:0.5},

headStyles:{
fillColor:[44,123,229],
textColor:255
}

})

let y=doc.lastAutoTable.finalY+10

doc.setFont("helvetica","bold")
doc.text("RETIRADA",14,y)

y+=10

doc.setFont("helvetica","normal")

doc.text("Assinatura Mecânico:",14,y)
doc.line(60,y,170,y)

y+=15

doc.text("Responsável Estoque:",14,y)
doc.line(70,y,170,y)

y+=20

doc.setFont("helvetica","bold")
doc.text("DEVOLUÇÃO",14,y)

y+=10

doc.setFont("helvetica","normal")

doc.text("Data retorno: ____ / ____ / ______",14,y)

let retorno=retirada.map(i=>[
i.codigo,
i.nome,
""
])

doc.autoTable({

startY:y+5,

head:[["Código","Produto","Qtd retornada"]],

body:retorno,

theme:"grid",

styles:{lineWidth:0.5},

headStyles:{
fillColor:[44,123,229],
textColor:255
}

})

y=doc.lastAutoTable.finalY+10

doc.text("Assinatura Mecânico:",14,y)
doc.line(60,y,170,y)

y+=15

doc.text("Responsável Estoque:",14,y)
doc.line(70,y,170,y)

let nomeArquivo="retirada_"+mecanico+"_"+data.replaceAll("/","-")+".pdf"

doc.save(nomeArquivo)

let pdfBase64 = doc.output('datauristring').split(',')[1]

fetch("https://script.google.com/macros/s/AKfycbyJSsOUMskuitVuWqvcnv8MuekJbmZ4Ja3bid9o4SiNcLplakBU_ClKH-40a0-_mdwddg/exec",{

method:"POST",

body:JSON.stringify({

pdf:pdfBase64,
nome:nomeArquivo,
data:data,
mecanico:mecanico

})

})

retirada=[]
render()

}

</script>

</body>
</html>
