<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Controle de Retirada de Peças</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>

body{
font-family:Arial;
background:#eef2f6;
margin:0;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.top{
display:flex;
align-items:center;
gap:20px;
margin-bottom:20px;
}

.logo{
height:60px;
}

h1{
margin:0;
color:#2c3e50;
}

.inputs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

input,select{
padding:10px;
font-size:16px;
border-radius:5px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2c7be5;
color:white;
padding:10px;
}

td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

.remover{
background:#e74c3c;
color:white;
border:none;
padding:5px 10px;
border-radius:4px;
cursor:pointer;
}

.btn{
margin-top:20px;
padding:12px 20px;
background:#27ae60;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<div class="top">

<img src="logo_siloking.png" class="logo">

<h1>Controle de Retirada de Peças</h1>

</div>

<div class="inputs">

<select id="mecanico">

<option>ANTONIO</option>
<option>RENATO</option>
<option>MAURICIO</option>
<option>ALAN</option>
<option>DANIEL</option>
<option>DANILO</option>
<option>LUCAS</option>
<option>WILLIAM</option>
<option>JOSE ROBERTO</option>
<option>AGNALDO</option>

</select>

<input id="codigo" placeholder="Bipar código">

<input id="quantidade" type="number" value="1">

</div>

<table>

<thead>
<tr>
<th>Código</th>
<th>Produto</th>
<th>Quantidade</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

<button class="btn" onclick="gerarPDF()">Gerar PDF</button>

</div>

<script>

let produtos=[]
let retirada=[]

fetch("produtos_base_completa.json")
.then(r=>r.json())
.then(data=>produtos=data)

document.getElementById("codigo").addEventListener("keypress",function(e){

if(e.key==="Enter"){

let codigo=this.value.trim()
let qtd=document.getElementById("quantidade").value

let produto=produtos.find(p=>p.codigo==codigo)

if(!produto){
alert("Produto não encontrado")
return
}

retirada.push({
codigo:produto.codigo,
nome:produto.nome,
quantidade:qtd
})

render()

this.value=""
document.getElementById("quantidade").value=1

}

})

function render(){

let tabela=document.getElementById("lista")
tabela.innerHTML=""

retirada.forEach((item,index)=>{

tabela.innerHTML+=`

<tr>
<td>${item.codigo}</td>
<td>${item.nome}</td>
<td>${item.quantidade}</td>
<td>
<button class="remover" onclick="remover(${index})">Remover</button>
</td>
</tr>

`

})

}

function remover(i){

retirada.splice(i,1)
render()

}

function gerarPDF(){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

let mecanico=document.getElementById("mecanico").value
let data=new Date().toLocaleDateString()

doc.setFillColor(44,123,229)
doc.rect(0,0,210,30,"F")

doc.setTextColor(255,255,255)
doc.setFontSize(18)
doc.text("SILOKING DO BRASIL",105,15,{align:"center"})

doc.setFontSize(12)
doc.text("Controle de Retirada de Peças",105,23,{align:"center"})

doc.setTextColor(0,0,0)

doc.setFontSize(11)

doc.text("Mecânico: "+mecanico,14,40)
doc.text("Data retirada: "+data,14,47)

let dados=retirada.map(i=>[
i.codigo,
i.nome,
i.quantidade
])

doc.autoTable({

startY:55,

head:[["Código","Produto","Quantidade"]],

body:dados,

theme:"grid",

headStyles:{
fillColor:[44,123,229]
}

})

let y=doc.lastAutoTable.finalY+10

doc.setFontSize(12)
doc.text("RETIRADA",14,y)

y+=10

doc.setFontSize(11)

doc.text("Assinatura Mecânico:",14,y)
doc.line(60,y,150,y)

y+=15

doc.text("Responsável Estoque:",14,y)
doc.line(70,y,150,y)

y+=20

doc.setFontSize(12)
doc.text("DEVOLUÇÃO",14,y)

y+=10

doc.text("Data retorno: ____ / ____ / ______",14,y)

let retorno=retirada.map(i=>[
i.codigo,""
])

doc.autoTable({

startY:y+5,

head:[["Código","Quantidade retornada"]],

body:retorno,

theme:"grid",

headStyles:{
fillColor:[44,123,229]
}

})

y=doc.lastAutoTable.finalY+10

doc.text("Assinatura Mecânico:",14,y)
doc.line(60,y,150,y)

y+=15

doc.text("Responsável Estoque:",14,y)
doc.line(70,y,150,y)

doc.save("retirada_pecas.pdf")

retirada=[]
render()

}

</script>

</body>

</html>
