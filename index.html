<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Retirada de Peças</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>

body{
font-family:Arial;
background:#eef2f6;
margin:0;
padding:15px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.top{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.logo{
height:50px;
}

h1{
margin:0;
color:#2c3e50;
font-size:22px;
}

.inputs{
display:flex;
gap:10px;
margin-bottom:15px;
flex-wrap:wrap;
}

input,select{
padding:10px;
font-size:16px;
border-radius:5px;
border:1px solid #ccc;
}

#codigo{
flex:1;
font-size:18px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2c7be5;
color:white;
padding:10px;
}

td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

tr:hover{
background:#f5f9ff;
}

.qtdInput{
width:60px;
text-align:center;
border:1px solid #ccc;
border-radius:4px;
}

.btnQtd{
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

.btnMais{
background:#2c7be5;
color:white;
}

.btnMenos{
background:#ccc;
}

.btnQtd:active{
transform:scale(0.9);
}

.resumo{
margin:15px 0;
padding:10px;
background:#f1f6ff;
border-left:5px solid #2c7be5;
font-weight:bold;
}

.btn{
margin-top:15px;
padding:14px;
background:#27ae60;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
width:100%;
transition:0.2s;
}

.btn:hover{
background:#219150;
}

@media(max-width:600px){
h1{ font-size:18px; }
}

</style>
</head>

<body>

<div class="container">

<div class="top">
<img src="logo_siloking.png" class="logo">
<h1>Controle de Retirada de Peças</h1>
</div>

<div class="inputs">

<select id="mecanico">
<option>ANTONIO</option>
<option>RENATO</option>
<option>MAURICIO</option>
<option>ALAN</option>
<option>DANIEL</option>
<option>DANILO</option>
<option>LUCAS</option>
<option>WILLIAM</option>
<option>JOSE ROBERTO</option>
<option>AGNALDO</option>
<option>PRODUÇÃO</option>
</select>

<div style="display:flex; flex:1; gap:5px;">
<input id="codigo" placeholder="Bipar código da peça">
<button type="button" onclick="adicionarCodigo()" style="
padding:10px 15px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
">OK</button>
</div>

</div>

<div class="resumo">
Itens diferentes: <span id="totalItens">0</span> |
Total de peças: <span id="totalPecas">0</span>
</div>

<table>
<thead>
<tr>
<th>Código</th>
<th>Produto</th>
<th>Quantidade</th>
<th></th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

<button class="btn" onclick="gerarPDF()">GERAR RELATÓRIO PDF</button>

</div>

<script>

let produtos=[]
let retirada=[]

fetch("produtos_base_completa.json")
.then(r=>r.json())
.then(data=>produtos=data)

document.getElementById("codigo").addEventListener("keypress",function(e){
if(e.key==="Enter"){
adicionarCodigo()
}
})

function atualizarResumo(){
document.getElementById("totalItens").innerText = retirada.length
let total = retirada.reduce((soma,item)=> soma + item.quantidade ,0)
document.getElementById("totalPecas").innerText = total
}

function adicionarCodigo(){

let campo=document.getElementById("codigo")
let codigo=campo.value.trim()

if(!codigo) return

let produto=produtos.find(p=>p.codigo==codigo)

if(!produto){
alert("Produto não encontrado")
return
}

let existente=retirada.find(p=>p.codigo==codigo)

if(existente){
existente.quantidade++
}else{
retirada.push({
codigo:produto.codigo,
nome:produto.nome,
quantidade:1
})
}

render()
campo.value=""
}

function render(){

let tabela=document.getElementById("lista")
tabela.innerHTML=""

retirada.forEach((item,index)=>{

tabela.innerHTML+=`
<tr>
<td>${item.codigo}</td>
<td>${item.nome}</td>
<td>
<div style="display:flex; justify-content:center; align-items:center; gap:5px;">
<button class="btnQtd btnMenos" onclick="diminuir(${index})">−</button>

<input class="qtdInput" type="number" min="1"
value="${item.quantidade}"
onchange="alterarQtd(${index},this.value)">

<button class="btnQtd btnMais" onclick="aumentar(${index})">+</button>
</div>
</td>
<td>
<button style="background:#e74c3c;color:white;border:none;padding:6px 10px;border-radius:5px;cursor:pointer;" onclick="remover(${index})">X</button>
</td>
</tr>
`
})

atualizarResumo()
}

function alterarQtd(i,v){
retirada[i].quantidade=parseInt(v) || 1
atualizarResumo()
}

function aumentar(i){
retirada[i].quantidade++
render()
}

function diminuir(i){
if(retirada[i].quantidade > 1){
retirada[i].quantidade--
render()
}
}

function remover(i){
retirada.splice(i,1)
render()
}

function gerarPDF(){

if(retirada.length===0){
alert("Nenhuma peça adicionada")
return
}

const {jsPDF}=window.jspdf
let doc=new jsPDF()

let mecanico=document.getElementById("mecanico").value
let data=new Date().toLocaleDateString()

// ===== TÍTULO ESTILIZADO =====

doc.setFont("helvetica","bold")
doc.setFontSize(22)

let titulo="SILOKING DO BRASIL"
let larguraTexto = doc.getTextWidth(titulo)
let xCentro = 105

// Faixa superior
doc.setFillColor(0,0,0)
doc.rect(xCentro - (larguraTexto/2), 15, larguraTexto, 6, "F")

// Texto
doc.setTextColor(0,0,0)
doc.text(titulo, xCentro, 30, {align:"center"})

// Faixa inferior
doc.setFillColor(0,0,0)
doc.rect(xCentro - (larguraTexto/2), 33, larguraTexto, 6, "F")

// Subtítulo
doc.setFontSize(12)
doc.text("Controle de Retirada de Peças",105,45,{align:"center"})

doc.setFont("helvetica","normal")
doc.setFontSize(11)

doc.text("Mecânico: "+mecanico,14,55)
doc.text("Data retirada: "+data,14,62)

// ===== TABELA RETIRADA =====

let dados=retirada.map(i=>[i.codigo,i.nome,i.quantidade])

doc.autoTable({
startY:70,
head:[["Código","Produto","Quantidade"]],
body:dados,
theme:"grid",
styles:{lineWidth:0.6},
headStyles:{fillColor:[0,0,0],textColor:255}
})

let y=doc.lastAutoTable.finalY+10

// ===== ASSINATURAS RETIRADA =====

doc.setFont("helvetica","bold")
doc.text("RETIRADA",14,y)
y+=10

doc.setFont("helvetica","normal")
doc.text("Assinatura Mecânico:",14,y)
doc.line(60,y,170,y)

y+=15
doc.text("Responsável Estoque:",14,y)
doc.line(70,y,170,y)

// ===== DEVOLUÇÃO =====

y+=25

doc.setFont("helvetica","bold")
doc.text("DEVOLUÇÃO",14,y)

y+=10
doc.setFont("helvetica","normal")
doc.text("Data retorno: ____ / ____ / ______",14,y)

let retorno=retirada.map(i=>[i.codigo,i.nome,""])

doc.autoTable({
startY:y+5,
head:[["Código","Produto","Qtd retornada"]],
body:retorno,
theme:"grid",
styles:{lineWidth:0.6},
headStyles:{fillColor:[0,0,0],textColor:255}
})

y=doc.lastAutoTable.finalY+10

doc.text("Assinatura Mecânico:",14,y)
doc.line(60,y,170,y)

y+=15
doc.text("Responsável Estoque:",14,y)
doc.line(70,y,170,y)

// ===== SALVAR =====

let nomeArquivo="retirada_"+mecanico+"_"+data.replaceAll("/","-")+".pdf"

doc.save(nomeArquivo)

let pdfBase64 = doc.output('datauristring').split(',')[1]

fetch("https://script.google.com/macros/s/AKfycbwYXvZLTdAW156Smmt-adSTpNUQ4epITnClG1YcZcy1mnjuO_XSjtjTYkeSvzv7QZ-UNw/exec",{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
pdf:pdfBase64,
nome:nomeArquivo,
data:data,
mecanico:mecanico
})
})

retirada=[]
render()

}

</script>

</body>
</html>
