<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Controle de Retirada de Peças</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#eef2f6;
margin:0;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.top{
display:flex;
align-items:center;
gap:20px;
margin-bottom:20px;
}

.logo{
height:60px;
}

h1{
margin:0;
color:#2c3e50;
}

.inputs{
display:flex;
gap:10px;
margin-bottom:20px;
}

input,select{
padding:10px;
font-size:16px;
border-radius:5px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2c7be5;
color:white;
padding:10px;
}

td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

.remover{
background:#e74c3c;
color:white;
border:none;
padding:5px 10px;
border-radius:4px;
cursor:pointer;
}

.btn{
margin-top:20px;
padding:12px 20px;
background:#27ae60;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<div class="top">

<img src="logo_siloking.png" class="logo">

<h1>Controle de Retirada de Peças</h1>

</div>

<div class="inputs">

<select id="mecanico">

<option>ANTONIO</option>
<option>RENATO</option>
<option>MAURICIO</option>
<option>ALAN</option>
<option>DANIEL</option>
<option>DANILO</option>
<option>LUCAS</option>
<option>WILLIAM</option>
<option>JOSE ROBERTO</option>
<option>AGNALDO</option>

</select>

<input id="codigo" placeholder="Bipar código">

<input id="quantidade" type="number" value="1">

</div>

<table>

<thead>
<tr>
<th>Código</th>
<th>Produto</th>
<th>Quantidade</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

<button class="btn" onclick="gerarPDF()">Gerar PDF</button>

</div>

<script>

let produtos=[]
let retirada=[]

fetch("produtos_base_completa.json")
.then(r=>r.json())
.then(data=>produtos=data)

document.getElementById("codigo").addEventListener("keypress",function(e){

if(e.key==="Enter"){

let codigo=this.value
let qtd=document.getElementById("quantidade").value

let produto=produtos.find(p=>p.codigo==codigo)

if(!produto){
alert("Produto não encontrado")
return
}

retirada.push({
codigo:produto.codigo,
nome:produto.nome,
quantidade:qtd
})

render()

this.value=""
document.getElementById("quantidade").value=1

}

})

function render(){

let tabela=document.getElementById("lista")
tabela.innerHTML=""

retirada.forEach((item,index)=>{

tabela.innerHTML+=`

<tr>
<td>${item.codigo}</td>
<td>${item.nome}</td>
<td>${item.quantidade}</td>
<td>
<button class="remover" onclick="remover(${index})">Remover</button>
</td>
</tr>

`

})

}

function remover(i){

retirada.splice(i,1)
render()

}

function gerarPDF(){

const {jsPDF}=window.jspdf
let doc=new jsPDF()

let mecanico=document.getElementById("mecanico").value
let data=new Date().toLocaleDateString()

doc.setFontSize(18)
doc.text("SILOKING DO BRASIL",70,20)

doc.setFontSize(13)
doc.text("Controle de Retirada de Peças",70,28)

doc.setFontSize(11)

doc.text("Mecânico: "+mecanico,20,45)
doc.text("Data retirada: "+data,20,52)

doc.line(20,55,190,55)

let y=65

doc.text("CÓDIGO",20,y)
doc.text("PRODUTO",60,y)
doc.text("QTD",180,y)

y+=5
doc.line(20,y,190,y)

y+=5

retirada.forEach(i=>{

doc.text(String(i.codigo),20,y)
doc.text(i.nome.substring(0,40),60,y)
doc.text(String(i.quantidade),180,y)

y+=8

})

y+=10
doc.line(20,y,190,y)

y+=10

doc.setFontSize(12)
doc.text("RETIRADA",20,y)

y+=10

doc.setFontSize(11)

doc.text("Assinatura Mecânico:",20,y)
doc.line(70,y,150,y)

y+=15

doc.text("Responsável Estoque:",20,y)
doc.line(75,y,150,y)

y+=20

doc.line(20,y,190,y)

y+=10

doc.setFontSize(12)
doc.text("DEVOLUÇÃO",20,y)

y+=10

doc.setFontSize(11)

doc.text("Data retorno: ____ / ____ / ______",20,y)

y+=10

doc.text("Código",20,y)
doc.text("Qtd retornada",60,y)

y+=5
doc.line(20,y,120,y)

y+=5

retirada.forEach(i=>{

doc.text(String(i.codigo),20,y)
doc.text("________",60,y)

y+=8

})

y+=10

doc.text("Assinatura Mecânico:",20,y)
doc.line(70,y,150,y)

y+=15

doc.text("Responsável Estoque:",20,y)
doc.line(75,y,150,y)

doc.save("retirada_pecas.pdf")

retirada=[]
render()

}

</script>

</body>
</html>
